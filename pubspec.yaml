name: pg_management
description: "Multi-Building PG Management App with Invoice Generation"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Firebase
  firebase_core: ^3.12.1
  firebase_auth: ^5.5.1
  cloud_firestore: ^5.6.5

  # State Management
  flutter_riverpod: ^2.6.1

  # PDF & File
  pdf: ^3.11.2
  printing: ^5.13.5
  path_provider: ^2.1.5
  share_plus: ^10.1.4
  open_file: ^3.5.10

  # Charts
  fl_chart: ^0.70.2

  # Utilities
  intl: ^0.20.2
  uuid: ^4.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
